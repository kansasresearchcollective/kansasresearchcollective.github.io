    <section class="contact">
        <h1 id="contact-title">Contact Us</h1>

        <form action="https://formspree.io/f/xdapqyjk" method="POST" class="contact-form">
            <label>Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Message</label>
            <textarea name="message" rows="6" required></textarea>

            <button type="submit">Send Message</button>
        </form>
        
        <img src="images/krc_v4.2-removebg.png" class="big-logo fade logo1" alt="KRC Logo">
    </section>

    <footer>
        <div class="footer">
            <div class="footer-top">
                <a href="https://www.instagram.com/ku.researchcollective/" target="_blank">
                    <img src="images/insta.png" id="insta" alt="Instagram">
                </a>

                <a href="https://www.linkedin.com/company/kansas-research-collective/?viewAsMember=true">
                    <img src="images/linkedin.png" id="linkedin" alt="LinkedIn">
                </a>
            </div>

            <div class="footer-bottom">
                <p>© 2026 Kansas Research Collective. All rights reserved.</p>
            </div>
        </div>
    </footer>
